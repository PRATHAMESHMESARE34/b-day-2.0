
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- =========================
            BACKGROUND EFFECTS
    ========================== -->

    <div id="hearts"></div>

    <div id="stars"></div>

    <div id="ribbons"></div>


    <!-- =========================
            BALLOON SCREEN
    ========================== -->

    <section id="balloonSection">

        <h1 class="mainTitle">
            🎂 Happy Birthday 🎂
        </h1>

        <p class="subtitle">
            Pop Every Balloon
        </p>

        <div id="balloonContainer">

            <!-- Created by JavaScript -->

        </div>

    </section>


    <!-- =========================
            MAIN WEBSITE
    ========================== -->

    <section id="mainContent" class="hidden">


        <!-- Birthday Card -->

        <div class="birthdayCard">

            <div class="fromTag">
                From <span id="fromName"></span>
            </div>

            <h1 id="wishTitle">
                Happy Birthday
            </h1>

            <h2 id="toName"></h2>

            <p class="wishText">

                Wishing you endless happiness,
                beautiful memories,
                and lots of love.
                May every dream come true.

                ❤️

            </p>

        </div>


        <!-- Gallery -->

        <div class="gallery">

            <div class="photo">
                <img src="images/pic1.jpg" alt="">
            </div>

            <div class="photo">
                <img src="images/pic2.jpg" alt="">
            </div>

            <div class="photo">
                <img src="images/pic3.jpg" alt="">
            </div>

            <div class="photo">
                <img src="images/pic4.jpg" alt="">
            </div>

            <div class="photo">
                <img src="images/pic5.jpg" alt="">
            </div>

        </div>

    </section>



    <!-- Background Music -->

    <audio
        id="bgMusic"
        src="music/birthday.mp3"
        loop>
    </audio>



    <!-- JS -->

    <script src="script.js"></script>

</body>
</html>
